<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Heatmap - Taskflow</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo">
        <span class="logo-mark"></span>
        <span class="logo-text">Taskflow</span>
      </div>
      <nav class="topbar-nav">
        <a href="/" class="nav-link">Tasks</a>
        <a href="/analytics" class="nav-link">Analytics</a>
        <a href="/heatmap" class="nav-link active">Heatmap</a>
      </nav>
    </div>
  </header>

  <main class="heatmap-container">
    <div class="heatmap-header">
      <h1 class="heatmap-title">Activity Heatmap</h1>
      <div class="heatmap-stats">
        <div class="heatmap-stat">
          <span class="heatmap-stat-label">Current Streak</span>
          <span class="heatmap-stat-value" id="currentStreak">
            <span class="heatmap-stat-number">--</span>
            <span class="heatmap-stat-unit">days</span>
          </span>
        </div>
        <div class="heatmap-stat">
          <span class="heatmap-stat-label">Longest Streak</span>
          <span class="heatmap-stat-value" id="longestStreak">
            <span class="heatmap-stat-number">--</span>
            <span class="heatmap-stat-unit">days</span>
          </span>
        </div>
        <div class="heatmap-stat">
          <span class="heatmap-stat-label">Total Completions</span>
          <span class="heatmap-stat-value" id="totalCompletions">
            <span class="heatmap-stat-number">--</span>
          </span>
        </div>
      </div>
    </div>

    <div class="heatmap-card">
      <div class="heatmap-grid-wrapper">
        <div class="heatmap-day-labels">
          <span class="heatmap-day-label">Mon</span>
          <span class="heatmap-day-label">Wed</span>
          <span class="heatmap-day-label">Fri</span>
          <span class="heatmap-day-label">Sun</span>
        </div>
        <div class="heatmap-grid-area">
          <div class="heatmap-month-labels" id="monthLabels"></div>
          <div class="heatmap-grid" id="heatmapGrid"></div>
        </div>
      </div>
      <div class="heatmap-legend">
        <span class="heatmap-legend-label">Less</span>
        <div class="heatmap-legend-cells">
          <div class="heatmap-cell heatmap-level-0"></div>
          <div class="heatmap-cell heatmap-level-1"></div>
          <div class="heatmap-cell heatmap-level-2"></div>
          <div class="heatmap-cell heatmap-level-3"></div>
          <div class="heatmap-cell heatmap-level-4"></div>
          <div class="heatmap-cell heatmap-level-5"></div>
        </div>
        <span class="heatmap-legend-label">More</span>
      </div>
    </div>
  </main>

  <div class="heatmap-tooltip" id="heatmapTooltip"></div>

  <script src="heatmap.js"></script>
</body>
</html>
